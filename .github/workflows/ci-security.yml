# Pipeline CI — Vérification et scans de sécurité
name: CI - Security Checks

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      # Installation de Terraform

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # Vérification du formatage du code Terraform
      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      # Initialisation de Terraform
      - name: Terraform Init
        run: terraform init -backend=false

      # Valider la syntaxe Terraform
      - name: Terraform Validate
        run: terraform validate

      # Scanner les misconfigurations de sécurité avec Trivy
      - name: Trivy IaC Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

      # Scanner avec Checkov
      - name: Checkov Security Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          soft_fail: false
          skip_check: CKV_AWS_119,CKV_AWS_145,CKV_AWS_135,CKV_AWS_126,CKV_AWS_144

      # Linter Ansible
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ansible-lint
        run: pip install ansible-lint

      - name: Ansible Lint
        run: ansible-lint ansible/playbooks/hardening.yml
