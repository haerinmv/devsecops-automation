all:
  children:
    bastion:
      hosts:
        bastion-public:
          ansible_host: "{{ bastion_ip }}"  
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519

    private_servers:
      hosts:
      vars:
        ansible_user: ubuntu
        ansible_ssh_private_key_file: ~/.ssh/id_ed25519
        ansible_ssh_common_args: '-o ProxyJump=ubuntu@{{ bastion_ip }}'
