---
# Playbook de Durcissement CIS Level 1
# La Pupart des règles ont été recuperer depuis la documentation officielle du CIS d'ansible
# https://galaxy.ansible.com/ui/

- name: CIS Level 1 - Hardening Ubuntu (mon bastion AWS)
  hosts: all
  become: true 

  tasks:

    - name: Maj des paquets
      apt:
        update_cache: yes
        upgrade: dist

    - name: Interdire le login root par SSH
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'

    - name: Forcer les ciphers forts uniquement
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?Ciphers'
        line: 'Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com'

    - name: Forcer les MACs forts
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?MACs'
        line: 'MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com'

    - name: Forcer les algorithmes d'échange de clés forts
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?KexAlgorithms'
        line: 'KexAlgorithms curve25519-sha256,curve25519-sha256@libssh.org,diffie-hellman-group16-sha512'

    - name: Réduire le LoginGraceTime à 30 secondes
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?LoginGraceTime'
        line: 'LoginGraceTime 30'

    - name: Limiter les tentatives d'auth à 3
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?MaxAuthTries'
        line: 'MaxAuthTries 3'

    - name: Désactiver X11 Forwarding
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?X11Forwarding'
        line: 'X11Forwarding no'

    - name: Interdire l'authentification par mot de passe
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'

    - name: Redémarrer le service SSH
      service:
        name: sshd
        state: restarted
    
    # Fail2ban

    - name: Installer fail2ban
      apt:
        name: fail2ban
        state: present

    - name: Activer et démarrer fail2ban
      service:
        name: fail2ban
        state: started
        enabled: true

    # Auditd

    - name: Installer auditd
      apt:
        name: auditd
        state: present

    - name: Activer et démarrer auditd
      service:
        name: auditd
        state: started
        enabled: true

    - name: Déployer les règles auditd CIS
      copy:
        dest: /etc/audit/rules.d/cis-hardening.rules
        owner: root
        group: root
        mode: '0640'
        content: |
          # Surveillance des fichiers d'identité
          -w /etc/passwd -p wa -k identity
          -w /etc/group -p wa -k identity
          -w /etc/shadow -p wa -k identity
          -w /etc/gshadow -p wa -k identity
          # Surveillance de sudo
          -w /etc/sudoers -p wa -k sudo_changes
          -w /etc/sudoers.d/ -p wa -k sudo_changes
          # Surveillance de la config SSH
          -w /etc/ssh/sshd_config -p wa -k sshd_config
          # Surveillance des logs d'auth
          -w /var/log/auth.log -p wa -k auth_logs
          # Verrouiller les règles
          -e 2

    - name: Supprimer les services non sécurisés
      apt:
        name:
          - telnet
          - rsh-client
          - rsh-server
        state: absent

    # UFW 
    
    - name: Installer UFW
      apt:
        name: ufw
        state: present

    - name: UFW - Bloquer tout le trafic entrant par défaut
      community.general.ufw:
        direction: incoming
        policy: deny

    - name: UFW - Autoriser le trafic sortant
      community.general.ufw:
        direction: outgoing
        policy: allow

    - name: UFW - Autoriser uniquement SSH (port 22)
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp

    - name: UFW - Activer le firewall
      community.general.ufw:
        state: enabled
    
    # sysctl : durcissement des paramètres kernel

    - name: Désactiver le routage IP
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: '0'
        sysctl_set: yes
        reload: yes

    - name: Ignorer les redirections ICMP
      ansible.posix.sysctl:
        name: net.ipv4.conf.all.accept_redirects
        value: '0'
        sysctl_set: yes
        reload: yes

    - name: Activer les SYN cookies (anti-DDoS)
      ansible.posix.sysctl:
        name: net.ipv4.tcp_syncookies
        value: '1'
        sysctl_set: yes
        reload: yes

    - name: Logger les paquets martiens
      ansible.posix.sysctl:
        name: net.ipv4.conf.all.log_martians
        value: '1'
        sysctl_set: yes
        reload: yes

    - name: Activer le reverse path filtering (anti-spoofing)
      ansible.posix.sysctl:
        name: net.ipv4.conf.all.rp_filter
        value: '1'
        sysctl_set: yes
        reload: yes

    - name: Activer ASLR complet
      ansible.posix.sysctl:
        name: kernel.randomize_va_space
        value: '2'
        sysctl_set: yes
        reload: yes

    # Permissions des fichiers sensibles

    - name: Verrouiller /etc/shadow (hash des mots de passe)
      file:
        path: /etc/shadow
        owner: root
        group: root
        mode: '0600'

    - name: Verrouiller /etc/gshadow
      file:
        path: /etc/gshadow
        owner: root
        group: root
        mode: '0600'

    # Bannière légale SSH

    - name: Déployer la bannière légale
      copy:
        dest: /etc/issue.net
        content: |
          ========================================================
          ACCES RESTREINT - SYSTEME SURVEILLE
          Tout acces non autorise est strictement interdit.
          Toutes les activites sont enregistrees et auditees.
          ========================================================
        owner: root
        group: root
        mode: '0644'

    - name: Activer la bannière dans SSH
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?Banner'
        line: 'Banner /etc/issue.net'
